<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>华力｜研策部年度KPI统计</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#8a6400;--gl:#f5e9c0;--gm:#c4a030;
  --rb:#fff0f0;--rt:#b00020;--rbd:#f5c0c0;
  --yb:#fffbeb;--yt:#7a5400;--ybd:#f0d878;
  --gb:#f0faf2;--gt:#145c28;--gbd:#a8ddb8;
  --bg:#f2f0ea;--card:#ffffff;--bdr:#d8d4cc;
  --tx:#111111;--t2:#444444;--t3:#888888;
  --r:16px;--rr:10px;
  --fn:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,.10);
}
@media(prefers-color-scheme:dark){:root:not(.light){
  --bg:#141210;--card:#1e1c18;--bdr:#302e28;
  --tx:#f0ece0;--t2:#b0a888;--t3:#686050;
  --gold:#c4a030;--gl:#2e2808;
  --rb:#2a1010;--rt:#f06060;--rbd:#5a2020;
  --yb:#2a2008;--yt:#d4a030;--ybd:#5a4010;
  --gb:#0e2618;--gt:#50c070;--gbd:#205030;
}}
:root.dark{
  --bg:#141210;--card:#1e1c18;--bdr:#302e28;
  --tx:#f0ece0;--t2:#b0a888;--t3:#686050;
  --gold:#c4a030;--gl:#2e2808;
  --rb:#2a1010;--rt:#f06060;--rbd:#5a2020;
  --yb:#2a2008;--yt:#d4a030;--ybd:#5a4010;
  --gb:#0e2618;--gt:#50c070;--gbd:#205030;
}
:root.light{
  --bg:#f2f0ea;--card:#ffffff;--bdr:#d8d4cc;
  --tx:#111111;--t2:#444444;--t3:#888888;
  --gold:#8a6400;
}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}

/* 顶栏 */
.topbar{background:var(--card);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.topinner{max-width:1400px;margin:0 auto;display:flex;align-items:center;height:56px;padding:0 20px;gap:12px}
.logo-back{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t3);text-decoration:none;padding:5px 10px;border-radius:8px;transition:background .15s}
.logo-back:hover{background:var(--bg)}
.logo-back svg{width:16px;height:16px;fill:currentColor}
.logo-title{font-size:15px;font-weight:700;color:var(--gold);flex:1;text-align:center}
.topbar-right{display:flex;align-items:center;gap:8px}
.yr-sw{display:flex;align-items:center;gap:4px}
.wb{width:28px;height:28px;border:0.5px solid var(--bdr);border-radius:7px;background:var(--card);color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.wb:hover{border-color:var(--gold);color:var(--gold)}
.wl{font-size:13px;color:var(--t2);min-width:54px;text-align:center;font-weight:700}
.theme-btn{width:30px;height:30px;border:0.5px solid var(--bdr);border-radius:8px;background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* 登录层 */
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(6px)}
.login-card{background:var(--card);border-radius:20px;padding:36px 32px;width:340px;box-shadow:var(--shadow-lg);text-align:center}
.login-card h2{font-size:20px;font-weight:800;margin-bottom:6px;color:var(--tx)}
.login-card p{font-size:13px;color:var(--t3);margin-bottom:24px}
.login-input{width:100%;padding:11px 14px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;background:var(--bg);color:var(--tx);font-family:var(--fn);margin-bottom:12px;transition:border-color .15s}
.login-input:focus{border-color:var(--gold);outline:none}
.btn-primary{width:100%;padding:11px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn);transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.login-err{color:var(--rt);font-size:12px;margin-top:8px;min-height:18px}

/* 主内容 */
.shell{max-width:1400px;margin:0 auto;padding:24px 20px 80px}

/* 图例 */
.legend{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;padding:12px 16px;background:var(--card);border:0.5px solid var(--bdr);border-radius:var(--rr)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)}
.legend-dot{width:12px;height:12px;border-radius:3px}

/* 日历网格 */
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-table{border-collapse:collapse;min-width:900px;width:100%}

/* 表头：人名列 */
.cal-table th.th-week{
  position:sticky;left:0;z-index:10;
  background:var(--card);
  font-size:10px;font-weight:700;color:var(--t3);
  padding:8px 12px;text-align:left;border-bottom:0.5px solid var(--bdr);
  border-right:0.5px solid var(--bdr);
  white-space:nowrap;min-width:130px;
}
.cal-table th.th-person{
  font-size:11px;font-weight:700;color:var(--t2);
  padding:8px 8px;text-align:center;
  border-bottom:0.5px solid var(--bdr);
  white-space:nowrap;min-width:68px;
}

/* 行 */
.cal-table td.td-week{
  position:sticky;left:0;z-index:5;
  background:var(--bg);
  font-size:11px;color:var(--t2);
  padding:5px 12px;border-bottom:0.5px solid var(--bdr);
  border-right:0.5px solid var(--bdr);
  white-space:nowrap;font-weight:600;
  cursor:pointer;transition:background .15s;min-width:130px;
}
.cal-table td.td-week:hover{background:var(--gl)}
.cal-table td.td-week.current-week{
  background:var(--gl);color:var(--gold);
}
.cal-table tr:last-child td{border-bottom:none}
.cal-table tr:hover td.td-week{background:rgba(0,0,0,.04)}

/* 评分单元格 */
.cal-table td.td-score{
  padding:4px 4px;text-align:center;
  border-bottom:0.5px solid var(--bdr);
  cursor:pointer;transition:opacity .15s;
}
.cal-table td.td-score:hover{opacity:.72}

/* 评分气泡 */
.score-bubble{
  display:inline-flex;align-items:center;justify-content:center;
  width:46px;height:26px;border-radius:6px;
  font-size:11px;font-weight:800;
  border:0.5px solid transparent;
}
.score-bubble.s-great{background:var(--gb);color:var(--gt);border-color:var(--gbd)}
.score-bubble.s-ok{background:var(--gl);color:var(--gold);border-color:#ddc878}
.score-bubble.s-warn{background:var(--yb);color:var(--yt);border-color:var(--ybd)}
.score-bubble.s-bad{background:var(--rb);color:var(--rt);border-color:var(--rbd)}
.score-bubble.s-empty{background:var(--bg);color:var(--t3);border-color:var(--bdr);font-weight:400;font-size:10px}
.score-bubble.s-future{background:transparent;color:transparent;border-color:transparent}

/* 当前周高亮行 */
.cal-table tr.current-row td{background:rgba(138,100,0,.04)}
.cal-table tr.current-row td.td-week{background:var(--gl)}

/* 月份分隔线 */
.cal-table tr.month-sep td{border-top:1.5px solid var(--bdr)}

/* tooltip */
.tooltip-wrap{position:relative;display:inline-block}
.tooltip-tip{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--tx);color:var(--bg);
  font-size:10px;padding:4px 8px;border-radius:6px;
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;
}
.tooltip-wrap:hover .tooltip-tip{opacity:1}

/* 同步状态 */
.sync-badge{position:fixed;bottom:20px;right:20px;z-index:300;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:all .3s}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:400;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.18);pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}

/* 加载骨架 */
.skeleton{background:linear-gradient(90deg,var(--bdr) 25%,var(--bg) 50%,var(--bdr) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:640px){
  .topinner{padding:0 12px}
  .shell{padding:16px 12px 80px}
  .score-bubble{width:36px;height:22px;font-size:10px}
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <div class="topinner">
    <a class="logo-back" href="/kpi/index.html" title="返回KPI周报">
      <svg viewBox="0 0 20 20"><path d="M12.5 15l-5-5 5-5"/></svg>
      周报KPI
    </a>
    <div class="logo-title">📊 华力｜研策部年度KPI统计</div>
    <div class="topbar-right">
      <div class="yr-sw">
        <button class="wb" onclick="prevYr()">‹</button>
        <div class="wl" id="yr-label">—</div>
        <button class="wb" onclick="nextYr()">›</button>
      </div>
      <span id="user-badge" style="font-size:12px;padding:5px 12px;background:var(--gl);border-radius:16px;color:var(--gold);font-weight:700"></span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="切换日夜">🌙</button>
    </div>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div style="font-size:40px;margin-bottom:12px">📊</div>
    <h2>登录统计</h2>
    <p>请输入你的姓名进入系统</p>
    <input class="login-input" id="login-name" type="text" placeholder="请输入真实姓名" autocomplete="off"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">进入系统</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 主内容 -->
<div class="shell" id="shell" style="display:none">
  <!-- 图例 -->
  <div class="legend">
    <span style="font-size:12px;font-weight:700;color:var(--t2);margin-right:4px">评分图例</span>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gb);border:0.5px solid var(--gbd)"></div> ≥0（全完成）</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gl);border:0.5px solid #ddc878"></div> -1（轻微）</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yb);border:0.5px solid var(--ybd)"></div> -2～-3（一般）</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--rb);border:0.5px solid var(--rbd)"></div> ≤-4（较差）</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--bg);border:0.5px solid var(--bdr)"></div> 无数据</div>
    <span style="margin-left:auto;font-size:11px;color:var(--t3)">点击某周跳转到对应周报KPI</span>
  </div>

  <!-- 统计表格 -->
  <div style="background:var(--card);border:0.5px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)">
    <div class="cal-wrap">
      <table class="cal-table" id="cal-table">
        <thead id="cal-head"></thead>
        <tbody id="cal-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 同步状态 -->
<div class="sync-badge" id="sync-badge" style="background:#e8f5ea;color:#1a6830;border:0.5px solid #a8ddb8">☁ 已同步</div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════
// ▌ 配置
// ════════════════════════════════════════════════════════════════
const PROXY_URL = 'https://ycb-zb-0g7962fmca5676a3-1255322631.ap-shanghai.app.tcloudbase.com/weeklyProxy';
const DIRECTORS = ['张建波','冷耀秋','Kenbe'];
const TB_STORE_KEY = 'hlzc_taskboard';
const TB_CLOUD_KEY = 'taskboard_scores';
const DEBUG = false;
const _log  = (...a) => DEBUG && console.log(...a);
const _warn = (...a) => DEBUG && console.warn(...a);

let _currentUser = localStorage.getItem('score_user') || '';
let _syncOk = false;

const NOW = new Date();
const {yr:CYR, wk:CWK} = isoWk(NOW);
let curYr = CYR;

// ════════════════════════════════════════════════════════════════
// ▌ 日期工具
// ════════════════════════════════════════════════════════════════
function isoWk(d){
  const t=new Date(d); t.setHours(0,0,0,0);
  t.setDate(t.getDate()+3-(t.getDay()+6)%7);
  const w=new Date(t.getFullYear(),0,4);
  return{yr:t.getFullYear(), wk:1+Math.round(((t-w)/864e5-(3-(w.getDay()+6)%7))/7)};
}
function wkKey(yr,wk){ return `${yr}-W${String(wk).padStart(2,'0')}`; }
function wkLabel(wk){ return `第${wk}周`; }

// 获取某年所有周的起始日期（周一）和结束日期（周日）
function getWeekDates(yr, wk){
  const j4 = new Date(yr,0,4);
  const mon = new Date(j4);
  mon.setDate(j4.getDate()-(j4.getDay()||7)+1+(wk-1)*7);
  const sun = new Date(mon);
  sun.setDate(mon.getDate()+6);
  return {mon, sun};
}

// "X月X日"格式（含周六日，完整7天）
function fmtCN(d){
  if(!d) return '';
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}

// 某年有多少个ISO周
function weeksInYear(yr){
  const d = new Date(yr,11,28);
  return isoWk(d).wk;
}

// ════════════════════════════════════════════════════════════════
// ▌ 数据读取
// ════════════════════════════════════════════════════════════════
function getProjects(){
  try{ return JSON.parse(localStorage.getItem('hlzc_p')||'[]'); }catch{return[];}
}
function getWeeks(){
  try{ return JSON.parse(localStorage.getItem('hlzc_w')||'{}'); }catch{return{};}
}
function getTBData(){
  try{ return JSON.parse(localStorage.getItem(TB_STORE_KEY)||'{}'); }catch{return{};}
}

function getOwners(projects){
  const s=new Set();
  projects.filter(p=>!p.archived&&p.designOwner&&p.designOwner.trim()).forEach(p=>{
    s.add(p.designOwner.trim());
  });
  return [...s].sort();
}

function getSnap(yr,wk,pid){
  const weeks=getWeeks(), k=wkKey(yr,wk);
  if(weeks[k]&&weeks[k][pid]!==undefined) return weeks[k][pid];
  const sorted=Object.keys(weeks).filter(x=>x<=k).sort();
  for(let i=sorted.length-1;i>=0;i--)
    if(weeks[sorted[i]]&&weeks[sorted[i]][pid]!==undefined)
      return{...weeks[sorted[i]][pid]};
  return{status:'g',stage:0,coreAction:''};
}

function parseTasks(coreAction){
  if(!coreAction) return [];
  if(Array.isArray(coreAction)){
    return coreAction.map(item=>typeof item==='object'?(item.text||''):String(item)).map(s=>s.trim()).filter(s=>s.length>0);
  }
  if(typeof coreAction!=='string') return [];
  return coreAction.replace(/\r/g,'').split('\n').map(s=>s.replace(/^[\d１２３４５６７８９０]+[、.．。]\s*/,'').trim()).filter(s=>s.length>0);
}

function getTaskStatus(owner,projId,taskIdx,wkKeyStr){
  const d=getTBData(), k=wkKeyStr;
  return (d[k]&&d[k][`${projId}_${owner}`]&&d[k][`${projId}_${owner}`][taskIdx])
    || {status:'pending',dueDate:''};
}

// 计算某周某人的分数
function calcScore(owner, projects, yr, wk){
  const k = wkKey(yr,wk);
  const all=[];
  projects.filter(p=>!p.archived&&p.designOwner===owner).forEach(proj=>{
    const snap=getSnap(yr,wk,proj.id);
    parseTasks(snap.coreAction).forEach((task,idx)=>{
      const st=getTaskStatus(owner,proj.id,idx,k);
      all.push({status:st.status});
    });
  });
  if(all.length===0) return null; // null = 无数据（该周不在范围内或未填写）
  const done  =all.filter(t=>t.status==='done').length;
  const undone=all.filter(t=>t.status==='undone').length;
  return{score:0-undone, done, undone, total:all.length};
}

// 判断某周是否在未来（不显示评分）
function isFutureWk(yr,wk){
  if(yr > CYR) return true;
  if(yr === CYR && wk > CWK) return true;
  return false;
}

function scoreClass(sc){
  if(!sc || sc.total===0) return 'empty';
  const s=sc.score;
  if(s>=0)  return 'great';
  if(s>=-1) return 'ok';
  if(s>=-3) return 'warn';
  return 'bad';
}

function scoreText(sc){
  if(!sc || sc.total===0) return '—';
  return sc.score>=0?'+'+sc.score:String(sc.score);
}

// ════════════════════════════════════════════════════════════════
// ▌ 渲染
// ════════════════════════════════════════════════════════════════
function renderCalendar(){
  const projects = getProjects();
  const owners   = getOwners(projects);
  const totalWks = weeksInYear(curYr);

  // 计算每人年度总分（只统计到当前周，未来周不算）
  const yearTotals = {};
  owners.forEach(owner=>{
    let sum=0, counted=0;
    for(let wk=1; wk<=totalWks; wk++){
      if(isFutureWk(curYr,wk)) break;
      const sc=calcScore(owner,projects,curYr,wk);
      if(sc && sc.total>0){
        sum+=sc.score;
        counted++;
      } else if(sc && sc.total===0){
        sum+=-5; // 无事项扣5
        counted++;
      }
      // sc===null：该周无数据，不计入
    }
    yearTotals[owner]={sum, counted};
  });

  // 表头：周 + 人名（两行：人名 + 年度总分）
  const head = document.getElementById('cal-head');
  head.innerHTML = `<tr>
    <th class="th-week" rowspan="2">周次 / 区间</th>
    ${owners.map(o=>`<th class="th-person" title="${esc(o)}">${esc(o)}</th>`).join('')}
  </tr>
  <tr>
    ${owners.map(o=>{
      const t=yearTotals[o];
      const tot=t?t.sum:0;
      const cls=tot>=0?'s-great':tot>=-3?'s-warn':'s-bad';
      const style=cls==='s-great'?'color:var(--gt);background:var(--gb)'
        :cls==='s-warn'?'color:var(--yt);background:var(--yb)'
        :'color:var(--rt);background:var(--rb)';
      return `<th class="th-person" style="border-bottom:1px solid var(--bdr);padding:4px 8px">
        <span style="display:inline-flex;align-items:center;justify-content:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:800;${style}">${tot>=0?'+'+tot:tot}</span>
        <div style="font-size:9px;color:var(--t3);margin-top:2px;font-weight:400">${t?t.counted:'0'}周累计</div>
      </th>`;
    }).join('')}
  </tr>`;

  // 表体：每行一周
  const body = document.getElementById('cal-body');
  let prevMonth = -1;
  let rows = '';

  for(let wk=1; wk<=totalWks; wk++){
    const {mon, sun} = getWeekDates(curYr, wk);
    const isCurrent = (curYr===CYR && wk===CWK);
    const isFuture  = isFutureWk(curYr, wk);
    const monMonth  = mon.getMonth();
    const sepClass  = (monMonth !== prevMonth && wk>1) ? ' month-sep' : '';
    prevMonth = monMonth;

    const wkStr    = wkLabel(wk);
    const rangeStr = fmtCN(mon)+'–'+fmtCN(sun);
    const kpiHref = `/kpi/index.html#w=${curYr}-${String(wk).padStart(2,'0')}`;

    const tdWeek = `<td class="td-week${isCurrent?' current-week':''}" onclick="gotoKpi(${curYr},${wk})" title="跳转到第${wk}周KPI详情">
      <div style="font-weight:700">${wkStr}</div>
      <div style="font-size:10px;color:var(--t3);margin-top:1px">${rangeStr}</div>
    </td>`;

    const scoreCells = owners.map(owner=>{
      if(isFuture){
        return `<td class="td-score"><div class="score-bubble s-future">·</div></td>`;
      }
      const sc = calcScore(owner, projects, curYr, wk);
      const cls = scoreClass(sc);
      const txt = scoreText(sc);
      const tip = sc ? `${owner} W${wk}：${sc.done}完成/${sc.undone}未完成 共${sc.total}项` : `${owner} W${wk}：暂无数据`;
      return `<td class="td-score" onclick="gotoKpi(${curYr},${wk})" title="${esc(tip)}">
        <div class="score-bubble s-${cls}">${esc(txt)}</div>
      </td>`;
    }).join('');

    rows += `<tr class="${isCurrent?'current-row':''}${sepClass}">
      ${tdWeek}
      ${scoreCells}
    </tr>`;
  }

  body.innerHTML = rows;

  // 滚动到当前周（仅当前年）
  if(curYr === CYR){
    requestAnimationFrame(()=>{
      const currentRow = body.querySelector('tr.current-row');
      if(currentRow) currentRow.scrollIntoView({block:'center',behavior:'smooth'});
    });
  }
}

function gotoKpi(yr, wk){
  // 跳转到 KPI 周报页并指定周
  localStorage.setItem('kpi_jump_wk', JSON.stringify({yr, wk}));
  location.href = '/kpi/index.html';
}

// ════════════════════════════════════════════════════════════════
// ▌ 年份切换
// ════════════════════════════════════════════════════════════════
function prevYr(){ curYr--; updYrLabel(); renderCalendar(); }
function nextYr(){
  if(curYr>=CYR){ showToast('已经是最新年份了','#ff9500'); return; }
  curYr++; updYrLabel(); renderCalendar();
}
function updYrLabel(){
  document.getElementById('yr-label').textContent = curYr+'年';
}

// ════════════════════════════════════════════════════════════════
// ▌ 云端通信
// ════════════════════════════════════════════════════════════════
async function _proxy(action, id, data, extra){
  const payload={action,...(id?{id}:{}),...(data?{data}:{}),...(extra||{})};
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),12000);
  try{
    const r=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:controller.signal});
    clearTimeout(timer);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const result=await r.json();
    if(result&&result.error) throw new Error(result.error);
    return result;
  }catch(e){ clearTimeout(timer); throw e; }
}
async function dbGet(id){ try{ return await _proxy('get',id); }catch(e){ return null; } }

async function _loadWeeklyData(){
  try{
    const projRec=await dbGet('projects');
    if(projRec&&projRec.projects) localStorage.setItem('hlzc_p',JSON.stringify(projRec.projects));
    const projects=getProjects();
    if(!projects.length) return;
    const allWeeks=getWeeks();
    await Promise.all(projects.map(proj=>dbGet('snap_'+proj.id).then(snapRec=>{
      if(snapRec&&snapRec.data){
        Object.keys(snapRec.data).forEach(wk=>{
          if(!allWeeks[wk]) allWeeks[wk]={};
          allWeeks[wk][proj.id]=snapRec.data[wk];
        });
      }
    }).catch(()=>{})));
    localStorage.setItem('hlzc_w',JSON.stringify(allWeeks));
    _syncOk=true;
  }catch(e){ _warn('周报数据拉取失败:',e.message); throw e; }
}

async function _loadTBFromCloud(){
  try{
    const rec=await dbGet(TB_CLOUD_KEY);
    if(rec&&rec.data){
      const local=getTBData();
      const merged={...rec.data};
      Object.keys(local).forEach(wk=>{
        if(!merged[wk]) merged[wk]=local[wk];
        else Object.assign(merged[wk],local[wk]);
      });
      localStorage.setItem(TB_STORE_KEY,JSON.stringify(merged));
    }
  }catch(e){ _warn('评分数据拉取失败:',e.message); }
}

// ════════════════════════════════════════════════════════════════
// ▌ UI 工具
// ════════════════════════════════════════════════════════════════
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showSyncStatus(state){
  const el=document.getElementById('sync-badge');
  if(!el) return;
  const M={local:['💻 本地模式','#f0ede4','#888'],sync:['☁ 已同步 ⚡','#e8f5ea','#1a6830'],saving:['💾 同步中…','#e8f0fe','#1a56a8'],err:['⚠ 同步失败','#fff0f0','#b00020']};
  const [t,bg,c]=M[state]||M.local;
  el.textContent=t; el.style.background=bg; el.style.color=c;
  el.style.border=`0.5px solid ${c}44`;
}

let _toastTimer=null;
function showToast(msg,color='#34c759'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=color;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// ── 主题切换 ──
(function(){
  const saved=localStorage.getItem('score_theme');
  if(saved) document.documentElement.className=saved;
  function updateBtn(){
    const btn=document.getElementById('theme-btn');
    if(!btn) return;
    const isDark=document.documentElement.classList.contains('dark')||(!document.documentElement.classList.contains('light')&&window.matchMedia('(prefers-color-scheme:dark)').matches);
    btn.textContent=isDark?'☀️':'🌙';
  }
  window.toggleTheme=function(){
    const root=document.documentElement;
    const isDark=root.classList.contains('dark')||(!root.classList.contains('light')&&window.matchMedia('(prefers-color-scheme:dark)').matches);
    if(isDark){root.classList.remove('dark');root.classList.add('light');localStorage.setItem('score_theme','light');}
    else{root.classList.remove('light');root.classList.add('dark');localStorage.setItem('score_theme','dark');}
    updateBtn();
  };
  document.addEventListener('DOMContentLoaded',()=>setTimeout(updateBtn,100));
})();

// ════════════════════════════════════════════════════════════════
// ▌ 登录
// ════════════════════════════════════════════════════════════════
function doLogin(){
  const name=document.getElementById('login-name').value.trim();
  if(!name){ document.getElementById('login-err').textContent='请输入姓名'; return; }
  _currentUser=name;
  localStorage.setItem('score_user',name);
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('shell').style.display='block';
  initApp();
}
function doLogout(){ _currentUser=''; localStorage.removeItem('score_user'); location.reload(); }

// ════════════════════════════════════════════════════════════════
// ▌ 初始化
// ════════════════════════════════════════════════════════════════
async function initApp(){
  const badge=document.getElementById('user-badge');
  if(badge) badge.textContent=_currentUser+(DIRECTORS.includes(_currentUser)?' 👑 总监':'');
  updYrLabel();

  // 骨架屏
  const calTable=document.getElementById('cal-table');
  document.getElementById('cal-body').innerHTML=
    `<tr><td colspan="20" style="padding:40px;text-align:center"><div class="skeleton" style="height:300px;border-radius:12px"></div></td></tr>`;
  showSyncStatus('saving');

  try{
    await _proxy('ping');
    await Promise.all([_loadWeeklyData(), _loadTBFromCloud()]);
    renderCalendar();
    showSyncStatus('sync');
    // 30秒轮询
    setInterval(async()=>{
      try{
        await Promise.all([_loadWeeklyData(), _loadTBFromCloud()]);
        renderCalendar();
      }catch(e){}
    }, 30000);
  }catch(e){
    _warn('初始化失败:',e.message);
    renderCalendar(); // 降级用本地缓存
    showSyncStatus('err');
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  if(_currentUser){
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('shell').style.display='block';
    initApp();
  }
  document.getElementById('login-name').addEventListener('keydown',e=>{
    if(e.key==='Enter') doLogin();
  });
});
</script>
