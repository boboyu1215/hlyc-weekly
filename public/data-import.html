<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据导入工具 - 华力周报系统</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f7fa;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #303133;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #909399;
      margin-bottom: 30px;
    }
    .section {
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #303133;
      margin-bottom: 15px;
    }
    .btn {
      padding: 12px 24px;
      margin: 10px 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #409eff;
      color: white;
    }
    .btn-primary:hover {
      background: #66b1ff;
    }
    .btn-success {
      background: #67c23a;
      color: white;
    }
    .btn-success:hover {
      background: #85ce61;
    }
    .btn-danger {
      background: #f56c6c;
      color: white;
    }
    .btn-danger:hover {
      background: #f78989;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 20px 0;
    }
    .stat-card {
      padding: 20px;
      background: #f0f9ff;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #409eff;
    }
    .stat-label {
      font-size: 14px;
      color: #606266;
      margin-top: 5px;
    }
    .message {
      padding: 15px;
      border-radius: 6px;
      margin: 15px 0;
    }
    .message-success {
      background: #f0f9ff;
      color: #409eff;
      border: 1px solid #b3d8ff;
    }
    .message-error {
      background: #fef0f0;
      color: #f56c6c;
      border: 1px solid #fbc4c4;
    }
    pre {
      background: #f5f7fa;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      max-height: 400px;
      font-size: 12px;
    }
    input[type="file"] {
      display: none;
    }
    .file-input-label {
      display: inline-block;
      padding: 12px 24px;
      background: #409eff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .file-input-label:hover {
      background: #66b1ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📥 数据导入工具</h1>
    <p class="subtitle">导入历史数据到新的Vue 3周报系统</p>

    <!-- 当前数据统计 -->
    <div class="section">
      <div class="section-title">当前数据统计</div>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="projectCount">0</div>
          <div class="stat-label">项目数量</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="weeklyCount">0</div>
          <div class="stat-label">周报数量</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="activityCount">0</div>
          <div class="stat-label">活动记录</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="loadStats()">🔄 刷新统计</button>
    </div>

    <!-- 数据导入 -->
    <div class="section">
      <div class="section-title">导入历史数据</div>
      <p style="color: #909399; margin-bottom: 15px;">
        选择从旧系统导出的JSON文件进行导入
      </p>
      <label for="fileInput" class="file-input-label">📂 选择JSON文件</label>
      <input type="file" id="fileInput" accept=".json" onchange="handleFileSelect(event)">
      <div id="importResult"></div>
    </div>

    <!-- 数据导出 -->
    <div class="section">
      <div class="section-title">数据导出</div>
      <button class="btn btn-success" onclick="exportData()">💾 导出所有数据</button>
    </div>

    <!-- 数据清理 -->
    <div class="section">
      <div class="section-title">数据清理</div>
      <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空所有数据</button>
    </div>

    <!-- 数据预览 -->
    <div class="section">
      <div class="section-title">数据预览</div>
      <button class="btn btn-primary" onclick="viewProjects()">查看项目</button>
      <button class="btn btn-primary" onclick="viewWeeks()">查看周报</button>
      <button class="btn btn-primary" onclick="viewActivity()">查看活动</button>
      <pre id="dataView"></pre>
    </div>
  </div>

  <script>
    const STORAGE_KEYS = {
      PROJECTS: 'hlzc_p',
      WEEKS: 'hlzc_w',
      ACTIVITY: 'hlzc_activity',
      USER: 'hlzc_user',
      USERS: 'hlzc_users'
    };

    function loadStats() {
      try {
        const projects = JSON.parse(localStorage.getItem(STORAGE_KEYS.PROJECTS) || '[]');
        const weeks = JSON.parse(localStorage.getItem(STORAGE_KEYS.WEEKS) || '{}');
        const activity = JSON.parse(localStorage.getItem(STORAGE_KEYS.ACTIVITY) || '[]');

        let weeklyCount = 0;
        Object.values(weeks).forEach(week => {
          weeklyCount += Object.keys(week).filter(key => key !== '__meetings').length;
        });

        document.getElementById('projectCount').textContent = projects.length;
        document.getElementById('weeklyCount').textContent = weeklyCount;
        document.getElementById('activityCount').textContent = activity.length;
      } catch (error) {
        alert('读取数据失败: ' + error.message);
      }
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);

          // 导入数据
          if (data.projects) {
            localStorage.setItem(STORAGE_KEYS.PROJECTS, JSON.stringify(data.projects));
          }
          if (data.weeks) {
            localStorage.setItem(STORAGE_KEYS.WEEKS, JSON.stringify(data.weeks));
          }
          if (data.activity) {
            localStorage.setItem(STORAGE_KEYS.ACTIVITY, JSON.stringify(data.activity));
          }
          if (data.user) {
            localStorage.setItem(STORAGE_KEYS.USER, data.user);
          }
          if (data.userRegistry) {
            localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(data.userRegistry));
          }

          document.getElementById('importResult').innerHTML =
            '<div class="message message-success">✅ 数据导入成功！<br>请访问 <a href="http://localhost:3004/" target="_blank">http://localhost:3004/</a> 查看效果</div>';

          loadStats();
        } catch (error) {
          document.getElementById('importResult').innerHTML =
            '<div class="message message-error">❌ 导入失败: ' + error.message + '</div>';
        }
      };
      reader.readAsText(file);
    }

    function exportData() {
      const data = {
        projects: JSON.parse(localStorage.getItem(STORAGE_KEYS.PROJECTS) || '[]'),
        weeks: JSON.parse(localStorage.getItem(STORAGE_KEYS.WEEKS) || '{}'),
        activity: JSON.parse(localStorage.getItem(STORAGE_KEYS.ACTIVITY) || '[]'),
        user: localStorage.getItem(STORAGE_KEYS.USER),
        userRegistry: JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '{}'),
        exportTime: new Date().toISOString(),
        version: '2.0.0'
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `weekly-backup-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      alert('✅ 数据已导出');
    }

    function clearAllData() {
      if (!confirm('⚠️ 确定要清空所有数据吗？此操作不可恢复！')) {
        return;
      }

      Object.values(STORAGE_KEYS).forEach(key => {
        localStorage.removeItem(key);
      });

      alert('✅ 数据已清空');
      loadStats();
    }

    function viewProjects() {
      const projects = JSON.parse(localStorage.getItem(STORAGE_KEYS.PROJECTS) || '[]');
      document.getElementById('dataView').textContent = JSON.stringify(projects, null, 2);
    }

    function viewWeeks() {
      const weeks = JSON.parse(localStorage.getItem(STORAGE_KEYS.WEEKS) || '{}');
      document.getElementById('dataView').textContent = JSON.stringify(weeks, null, 2);
    }

    function viewActivity() {
      const activity = JSON.parse(localStorage.getItem(STORAGE_KEYS.ACTIVITY) || '[]');
      document.getElementById('dataView').textContent = JSON.stringify(activity, null, 2);
    }

    // 页面加载时自动刷新统计
    window.onload = loadStats;
  </script>
</body>
</html>
